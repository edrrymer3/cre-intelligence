services:
  - type: web
    name: cre-intelligence
    env: node
    buildCommand: npm install && npm run build
    startCommand: node node_modules/.bin/next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
